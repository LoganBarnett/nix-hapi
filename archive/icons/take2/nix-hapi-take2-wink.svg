<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 501.56 501.56">
  <defs>
    <linearGradient id="light-blue-stops">
      <stop offset="0" stop-color="#699ad7"/>
      <stop offset="0.243" stop-color="#7eb1dd"/>
      <stop offset="1" stop-color="#7ebae4"/>
    </linearGradient>
    <linearGradient id="dark-blue-stops">
      <stop offset="0" stop-color="#415e9a"/>
      <stop offset="0.232" stop-color="#4a6baf"/>
      <stop offset="1" stop-color="#5277c3"/>
    </linearGradient>
    <linearGradient id="light-grad" xlink:href="#light-blue-stops"
        gradientUnits="userSpaceOnUse"
        gradientTransform="translate(70.650339,-1055.1511)"
        x1="200.59668" y1="351.41116" x2="290.08701" y2="506.18814"/>
    <linearGradient id="dark-grad" xlink:href="#dark-blue-stops"
        gradientUnits="userSpaceOnUse"
        gradientTransform="translate(864.69589,-1491.3405)"
        x1="-584.19934" y1="782.33563" x2="-496.29703" y2="937.71399"/>
  </defs>
  <g transform="translate(-156.41121,933.30685)">
    <g transform="matrix(0.99994059,0,0,0.99994059,-0.06321798,33.188377)">
      <path id="light-arm"
            d="m 309.54892,-710.38827 122.19683,211.67512 -56.15706,0.5268 -32.6236,-56.8692 -32.85645,56.5653 -27.90237,-0.011 -14.29086,-24.6896 46.81047,-80.4901 -33.22946,-57.8257 z"
            fill="url(#light-grad)" fill-rule="evenodd"/>
      <use xlink:href="#light-arm" transform="rotate(60,407.11155,-715.78724)"/>
      <use xlink:href="#light-arm" transform="rotate(-60,407.31177,-715.70016)"/>
      <path id="dark-arm"
            d="m 309.54892,-710.38827 122.19683,211.67512 -56.15706,0.5268 -32.6236,-56.8692 -32.85645,56.5653 -27.90237,-0.011 -14.29086,-24.6896 46.81047,-80.4901 -33.22946,-57.8256 z"
            fill="url(#dark-grad)" fill-rule="evenodd"/>
      <use xlink:href="#dark-arm" transform="rotate(120,407.33916,-716.08356)"/>
      <use xlink:href="#dark-arm" transform="rotate(-120,407.28823,-715.86995)"/>
    </g>
  </g>
  <!-- Face: winking with tongue -->
  <g transform="translate(250.5,250.5)">
    <circle cx="0" cy="0" r="70" fill="white" opacity="0.9"/>
    <!-- Left eye (open) -->
    <circle cx="-25" cy="-15" r="11" fill="#333"/>
    <circle cx="-21" cy="-20" r="4" fill="white"/>
    <!-- Right eye (winking) -->
    <path d="M 12,-15 Q 25,-5 38,-15" fill="none" stroke="#333" stroke-width="6" stroke-linecap="round"/>
    <!-- Smile -->
    <path d="M -30,12 Q 0,40 30,12" fill="none" stroke="#333" stroke-width="6" stroke-linecap="round"/>
    <!-- Tongue -->
    <ellipse cx="15" cy="35" rx="12" ry="18" fill="#E57373" stroke="#333" stroke-width="4"/>
  </g>
</svg>
